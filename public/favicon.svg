<svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="oklch(0.78 0.14 55)" /> <!-- Amber sunset -->
      <stop offset="100%" stop-color="oklch(0.45 0.12 210)" /> <!-- Mid ocean blue -->
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <!-- Glow Sun Circle -->
  <circle cx="50" cy="45" r="30" fill="url(#logoGradient)" opacity="0.15" filter="url(#glow)" />
  <circle cx="50" cy="45" r="24" stroke="url(#logoGradient)" stroke-width="1.5" opacity="0.6" stroke-dasharray="4 2" />
  
  <!-- Waves inside and flowing out -->
  <path d="M20,60 C35,45 45,75 60,60 C75,45 85,55 95,50" stroke="url(#logoGradient)" stroke-width="3" stroke-linecap="round" />
  <path d="M10,70 C25,55 35,85 55,70 C75,55 80,65 90,60" stroke="url(#logoGradient)" stroke-width="2" stroke-linecap="round" opacity="0.7" />
  <path d="M30,50 C40,40 48,60 58,50 C68,40 74,45 80,42" stroke="url(#logoGradient)" stroke-width="1.5" stroke-linecap="round" opacity="0.5" />
</svg>
